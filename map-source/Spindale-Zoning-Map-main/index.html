        html, body, #map {
            width: 100%;

        /* Custom road labels: follows road angle and flips text so it stays readable */
        .road-label-along-line {
            position: absolute;
            white-space: nowrap;
            pointer-events: none;
            color: #323232;
            font-size: 7pt;
            font-weight: bold;

            transform-origin: center center;
            line-height: 1;
        }
        .mobile-search-toggle { display: none; }

        /* Touch-friendly controls for the unified mobile view. */
        @media (max-width: 700px) {

                max-width: min(250px, calc(100vw - 16px));
                max-height: 42vh;
                overflow-y: auto;
                font-size: 12px;
            }

            .leaflet-control-zoom a {
                width: 36px;
                height: 36px;
                line-height: 36px;
            }
            .custom-parcel-search {

                left: 0 !important;
                top: auto !important;
                bottom: 48px !important;
                max-width: calc(100vw - 20px) !important;
                padding: 3px !important;
                z-index: 1200 !important;
                border: 0 !important;
            }
            .mobile-search-toggle {
                display: block;
                width: 76px !important;
                height: 28px !important;
                min-height: 28px !important;
                padding: 0 8px !important;
                border: 1px solid #9eb8bf !important;
                border-radius: 7px !important;
                background: #fff !important;
                color: #075d71 !important;
                font: bold 12px/26px Arial, sans-serif !important;
                text-align: left;
            }
            .mobile-search-row { margin-top: 3px !important; }
            .custom-parcel-search.mobile-collapsed .mobile-search-row,
            .custom-parcel-search.mobile-collapsed .custom-parcel-search-suggestions {
                display: none !important;
            }
            .custom-parcel-search.mobile-open .mobile-search-toggle {
                display: none !important;

            .custom-parcel-search input {

                height: 30px !important;
                padding: 3px 6px !important;
                font-size: 14px !important;

            .custom-parcel-search button {
                width: 30px !important;
                height: 30px !important;
                font-size: 14px !important;
            }
            .custom-parcel-search .mobile-search-toggle {

                width: 76px !important;
                height: 28px !important;
                min-height: 28px !important;
                line-height: 28px !important;

        var highlightLayer;
        function highlightFeature(e) {
            highlightLayer = e.target;

            if (e.target.feature.geometry.type === 'LineString' || e.target.feature.geometry.type === 'MultiLineString') {
              highlightLayer.setStyle({
                color: 'rgba(255, 255, 0, 1.00)',
              });
            } else {
              highlightLayer.setStyle({
                fillColor: 'rgba(255, 255, 0, 1.00)',
                fillOpacity: 1
              });
            }
        }
        var map = L.map('map', {
            zoomControl:false, maxZoom:28, minZoom:2, zoomSnap:0.05
        })
        var hash = new L.Hash(map);
        map.attributionControl.setPrefix('<a href="https://github.com/qgis2web/qgis2web" target="_blank">qgis2web</a> &middot; <a href="https://leafletjs.com" title="A JS library for interactive maps">Leaflet</a> &middot; <a href="https://qgis.org">QGIS</a>');
        var autolinker = new Autolinker({truncate: {length: 30, location: 'smart'}});
        // remove popup's row if "visible-with-data"
        function hasPopupValue(value) {
            if (value === null || value === undefined) {
                return false;
            }
            var text = String(value).trim();
            return text !== '' && text.toLowerCase() !== 'null' && text.toLowerCase() !== 'false';
        }

        function popupLinkValue(value) {
            return autolinker.link(String(value).replace(/'/g, '\'').toLocaleString());
        }

        function removeEmptyRowsFromPopupContent(content, feature) {
         var tempDiv = document.createElement('div');
         tempDiv.innerHTML = content;
         var rows = tempDiv.querySelectorAll('tr');
         for (var i = 0; i < rows.length; i++) {
             var td = rows[i].querySelector('td.visible-with-data');
             var key = td ? td.id : '';
             if (td && td.classList.contains('visible-with-data') && !hasPopupValue(feature.properties[key])) {
                 rows[i].parentNode.removeChild(rows[i]);
             }
         }
         return tempDiv.innerHTML;
        }
        // modify popup if contains media
        function addClassToPopupIfMedia(content, popup) {
            var tempDiv = document.createElement('div');
            tempDiv.innerHTML = content;
            var imgTd = tempDiv.querySelector('td img');
            if (imgTd) {
                var src = imgTd.getAttribute('src');
                if (/\.(jpg|jpeg|png|gif|bmp|webp|avif)$/i.test(src)) {
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.update();
                    }, 10);
                } else if (/\.(mp3|wav|ogg|aac)$/i.test(src)) {
                    var audio = document.createElement('audio');
                    audio.controls = true;
                    audio.src = src;
                    imgTd.parentNode.replaceChild(audio, imgTd);
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else if (/\.(mp4|webm|ogg|mov)$/i.test(src)) {
                    var video = document.createElement('video');
                    video.controls = true;
                    video.src = src;
                    video.style.width = "400px";
                    video.style.height = "300px";
                    video.style.maxHeight = "60vh";
                    video.style.maxWidth = "60vw";
                    imgTd.parentNode.replaceChild(video, imgTd);
                    popup._contentNode.classList.add('media');
                    // Aggiorna il popup quando il video carica i metadati
                    video.addEventListener('loadedmetadata', function() {
                        popup.update();
                    });
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else {
                    popup._contentNode.classList.remove('media');
                }
            } else {
                popup._contentNode.classList.remove('media');
            }
        }
        var zoomControl = L.control.zoom({
            position: 'topleft'
        }).addTo(map);
        var measureControl = new L.Control.Measure({
            position: 'topleft',
            primaryLengthUnit: 'feet',
            secondaryLengthUnit: 'miles',
            primaryAreaUnit: 'sqfeet',
            secondaryAreaUnit: 'sqmiles'
        });
        measureControl.addTo(map);
        document.getElementsByClassName('leaflet-control-measure-toggle')[0].innerHTML = '';
        document.getElementsByClassName('leaflet-control-measure-toggle')[0].className += ' fas fa-ruler';
        var bounds_group = new L.featureGroup([]);
        var PARCEL_SELECTION_MAX_ZOOM = 20;
        var PARCEL_SELECTION_SCREEN_RATIO = 0.75;
        var defaultParcelBounds = null;
        var searchParcelViewLocked = false;
        var programmaticViewChange = false;
        var programmaticViewToken = 0;

        function parcelSelectionFitOptions() {
            var size = map.getSize();
            var sidePaddingRatio = (1 - PARCEL_SELECTION_SCREEN_RATIO) / 2;
            return {
                padding: [
                    Math.max(12, Math.round(size.x * sidePaddingRatio)),
                    Math.max(12, Math.round(size.y * sidePaddingRatio))
                ],
                maxZoom: PARCEL_SELECTION_MAX_ZOOM,
                animate: false
            };
        }

        function fitMapToBounds(bounds, options) {
            if (!bounds || !bounds.isValid || !bounds.isValid()) {
                return;
            }

            map.invalidateSize(false);

            var token = ++programmaticViewToken;
            programmaticViewChange = true;

            function finishProgrammaticViewChange() {
                if (programmaticViewToken === token) {
                    programmaticViewChange = false;
                }
            }

            map.once('moveend', finishProgrammaticViewChange);
            map.fitBounds(bounds, options || {});
            setTimeout(finishProgrammaticViewChange, 900);
        }

        function setBounds() {
            if (typeof layer_Parcels_11 !== 'undefined' && layer_Parcels_11.getBounds && layer_Parcels_11.getBounds().isValid()) {
                defaultParcelBounds = layer_Parcels_11.getBounds();
                fitMapToBounds(defaultParcelBounds, {
                    padding: [0, 0],
                    animate: false
                });
            } else if (bounds_group.getLayers().length) {
                defaultParcelBounds = bounds_group.getBounds();
                fitMapToBounds(defaultParcelBounds, {
                    padding: [0, 0],
                    animate: false
                });
            }
        }

        function resetMapToDefaultView() {
            if (!defaultParcelBounds || !defaultParcelBounds.isValid || !defaultParcelBounds.isValid()) {
                if (typeof layer_Parcels_11 !== 'undefined' && layer_Parcels_11.getBounds && layer_Parcels_11.getBounds().isValid()) {
                    defaultParcelBounds = layer_Parcels_11.getBounds();
                } else if (bounds_group.getLayers().length) {
                    defaultParcelBounds = bounds_group.getBounds();
                }
            }

            if (defaultParcelBounds && defaultParcelBounds.isValid && defaultParcelBounds.isValid()) {
                fitMapToBounds(defaultParcelBounds, {
                    padding: [0, 0],
                    animate: false
                });
            }
        }

            layer.on({

			layer.bindPopup(content, { maxHeight: 400 });

                    if (matches.length === 0) {
                        suggestions.style.display = 'none';
                        return;
                    }

                    var prefixMatches = matches.filter(function(match) {
                        return match.parcelNumber.toLowerCase().indexOf(query) === 0;
                    });

                    if (prefixMatches.length === 1 && query.length >= 2 && document.activeElement === parcelInput) {
                        var completedNumber = prefixMatches[0].parcelNumber;

                        if (completedNumber.length > typedLength) {
                            parcelInput.value = completedNumber;

                            if (parcelInput.setSelectionRange) {
                                parcelInput.setSelectionRange(typedLength, completedNumber.length);
                            }
                        }
                    }

                    for (var i = 0; i < matches.length; i++) {
                        (function(match) {
                            var item = L.DomUtil.create('div', '', suggestions);
                            item.textContent = match.parcelNumber + (match.address ? ' — ' + match.address : '');
                            item.style.padding = '5px 8px';
                            item.style.cursor = 'pointer';
                            item.style.borderBottom = '1px solid #eee';
                            item.style.fontSize = '12px';
                            item.style.color = '#000';
                            item.style.background = '#fff';

                            item.onmouseover = function() {
                                item.style.background = '#f2f2f2';
                            };

                            item.onmouseout = function() {
                                item.style.background = '#fff';
                            };

                            L.DomEvent.on(item, 'click', function(e) {
                                L.DomEvent.stop(e);
                                parcelInput.value = match.parcelNumber;
                                selectParcelLayer(match.layer, parcelInput, {fromSearch: true});
                            });
                        })(matches[i]);
                    }

                    suggestions.style.display = 'block';
                }

                L.DomEvent.on(button, 'click', selectParcelFromSearch);
                L.DomEvent.on(parcelButton, 'click', selectParcelFromNumberSearch);
                L.DomEvent.on(input, 'input', updateSuggestions);
                L.DomEvent.on(input, 'focus', updateSuggestions);
                L.DomEvent.on(parcelInput, 'input', updateParcelNumberSuggestions);
                L.DomEvent.on(parcelInput, 'focus', updateParcelNumberSuggestions);

                L.DomEvent.on(input, 'keydown', function(e) {
                    if (e.key === 'Enter') {
                        selectParcelFromSearch();
                    }

                    if (e.key === 'Escape') {
                        suggestions.style.display = 'none';
                        input.blur();
                    }
                });

                L.DomEvent.on(parcelInput, 'keydown', function(e) {
                    if (e.key === 'Enter') selectParcelFromNumberSearch();
                    if (e.key === 'Escape') {
                        suggestions.style.display = 'none';
                        parcelInput.blur();
                    }
                });

                L.DomEvent.on(document, 'click', function() {
                    suggestions.style.display = 'none';
                });

                L.DomEvent.on(document, 'click', function(e) {
                    if (container.classList.contains('mobile-open') && !container.contains(e.target)) {
                        setSearchCollapsed(true);
                    }
                });

                return container;
            }
        });

        map.addControl(new CustomParcelSearch());

        var ResetDefaultZoomControl = L.Control.extend({
            options: {
                position: 'bottomleft'
            },

            onAdd: function(map) {
                var container = L.DomUtil.create('div', 'leaflet-bar reset-default-zoom-control');
                var button = L.DomUtil.create('a', '', container);
                button.href = '#';
                button.title = 'Reset map to default parcel view';
                button.setAttribute('aria-label', 'Reset map to default parcel view');
                button.innerHTML = 'Reset View';
                button.style.width = '76px';
                button.style.height = '28px';
                button.style.lineHeight = '28px';
                button.style.padding = '0 8px';
                button.style.whiteSpace = 'nowrap';
                button.style.font = 'bold 12px/28px Arial, sans-serif';
                button.style.color = '#17313a';
                button.style.background = '#fff';
                button.style.textDecoration = 'none';
                button.style.textAlign = 'center';

                L.DomEvent.disableClickPropagation(container);
                L.DomEvent.disableScrollPropagation(container);
                L.DomEvent.on(button, 'click', function(e) {
                    L.DomEvent.stop(e);
                    resetMapToDefaultView();
                });

                return container;
            }
        });

        map.addControl(new ResetDefaultZoomControl());

        var dashboardDistrictLayers = {
            R20: layer_R20_5,
            R10: layer_R10_6,
            R6: layer_R6_7,
            NB: layer_NB_4,
            CC: layer_CC_2,
            GC: layer_GC_3,
            HC: layer_HCI_1
        };

        window.addEventListener('message', function(event) {
            var message = event.data || {};

            if (message.type === 'SPINDALE_DASHBOARD_DISTRICT' && message.district) {
                if (searchParcelViewLocked && selectedParcelLayer) {
                    return;
                }

                var districtLayer = dashboardDistrictLayers[message.district];
                if (districtLayer) {
                    if (!map.hasLayer(districtLayer)) map.addLayer(districtLayer);
                }
            }

            if (message.type === 'SPINDALE_CLEAR_PARCEL') {
                if (selectedParcelLayer) layer_Parcels_11.resetStyle(selectedParcelLayer);
                selectedParcelLayer = null;
                searchParcelViewLocked = false;
                map.closePopup();
                window.parent.postMessage({type:'SPINDALE_PARCEL_CLEARED'}, '*');
            }
        });

        window.parent.postMessage({type:'SPINDALE_MAP_READY'}, '*');
		document.addEventListener("DOMContentLoaded", function() {
            // set new Layers List height which considers toggle icon
            function newLayersListHeight() {
                var layerScrollbarElement = document.querySelector('.leaflet-control-layers-scrollbar');
                if (layerScrollbarElement) {
                    var layersListElement = document.querySelector('.leaflet-control-layers-list');
                    var originalHeight = layersListElement.style.height 
                        || window.getComputedStyle(layersListElement).height;
                    var newHeight = parseFloat(originalHeight) - 50;
                    layersListElement.style.height = newHeight + 'px';
                }
            }
            var isLayersListExpanded = true;
            var controlLayersElement = document.querySelector('.leaflet-control-layers');
            var toggleLayerControl = document.querySelector('.leaflet-control-layers-toggle');
            // toggle Collapsed/Expanded and apply new Layers List height
            toggleLayerControl.addEventListener('click', function() {
                if (isLayersListExpanded) {
                    controlLayersElement.classList.remove('leaflet-control-layers-expanded');
                } else {
                    controlLayersElement.classList.add('leaflet-control-layers-expanded');
                }
                isLayersListExpanded = !isLayersListExpanded;
                newLayersListHeight()
            });	
			// apply new Layers List height if toggle layerstree
			if (controlLayersElement) {
				controlLayersElement.addEventListener('click', function(event) {
					var toggleLayerHeaderPointer = event.target.closest('.leaflet-layerstree-header-pointer span');
					if (toggleLayerHeaderPointer) {
						newLayersListHeight();
					}
				});
			}
            // Collapsed/Expanded at Start to apply new height
            setTimeout(function() {
                toggleLayerControl.click();
            }, 10);
            setTimeout(function() {
                toggleLayerControl.click();
            }, 10);
            // Collapsed touch/small screen
            var isSmallScreen = window.innerWidth < 650;
            if (isSmallScreen) {
                setTimeout(function() {
                    controlLayersElement.classList.remove('leaflet-control-layers-expanded');
                    isLayersListExpanded = !isLayersListExpanded;
                }, 500);
            }  
        });       
        setBounds();
        setTimeout(resetMapToDefaultView, 150);
        // --- Road labels that sit along the road centerline ---
        // This replaces the qgis2web tooltip labels. It picks the best straight segment
        // of each road feature, rotates the text to match that segment, then flips it
        // when needed so the label is never upside down.
        map.createPane('pane_RoadLabels_Custom');
        map.getPane('pane_RoadLabels_Custom').style.zIndex = 650;
        map.getPane('pane_RoadLabels_Custom').style.pointerEvents = 'none';

        function flattenRoadPaths(latlngs) {
            var paths = [];
            function walk(arr) {
                if (!arr || !arr.length) return;
                if (arr[0] && typeof arr[0].lat === 'number') {
                    paths.push(arr);
                } else {
                    for (var i = 0; i < arr.length; i++) walk(arr[i]);
                }
            }
            walk(latlngs);
            return paths;
        }

        function normalizeAngle(angle) {
            while (angle <= -180) angle += 360;
            while (angle > 180) angle -= 360;
            return angle;
        }

        function correctedRoadLabelAngle(angle, x, y) {
            // Working sketch logic:
            // east/west roads read left-to-right;
            // north/south roads above the map center use +90;
            // north/south roads below the map center use -90;
            // diagonal roads are flipped only when they would read upside down.
            angle = normalizeAngle(angle);

            var absAngle = Math.abs(angle);
            var center = map.getSize().divideBy(2);

            // Nearly horizontal: keep it left-to-right.
            if (absAngle <= 8 || absAngle >= 172) {
                return 0;
            }

            // Nearly vertical: use the top/bottom pattern from your sketch.
            if (Math.abs(absAngle - 90) <= 8) {
                return y < center.y ? 90 : -90;
            }

            // General case: keep label readable. This prevents upside-down text
            // while still letting diagonal roads keep their actual angle.
            if (angle > 90) angle -= 180;
            if (angle < -90) angle += 180;
            return angle;
        }

        function bestLabelPosition(layer) {
            var paths = flattenRoadPaths(layer.getLatLngs());
            var best = null;

            for (var p = 0; p < paths.length; p++) {
                var path = paths[p];
                for (var i = 0; i < path.length - 1; i++) {
                    var a = map.latLngToLayerPoint(path[i]);
                    var b = map.latLngToLayerPoint(path[i + 1]);
                    var dx = b.x - a.x;
                    var dy = b.y - a.y;
                    var len = Math.sqrt(dx * dx + dy * dy);
                    if (len < 18) continue;

                    if (!best || len > best.len) {
                        best = {
                            x: (a.x + b.x) / 2,
                            y: (a.y + b.y) / 2,
                            rawAngle: Math.atan2(dy, dx) * 180 / Math.PI,
                            len: len
                        };
                    }
                }
            }
            return best;
        }

        function labelBoxesOverlap(a, b) {
            return !(a.right < b.left || a.left > b.right || a.bottom < b.top || a.top > b.bottom);
        }

        function hideOverlappingRoadLabels() {
            var shown = [];
            var roadLabels = Array.prototype.slice.call(document.querySelectorAll('.road-label-along-line'));

            roadLabels.sort(function(a, b) {
                return Number(b.getAttribute('data-road-length')) - Number(a.getAttribute('data-road-length'));
            });

            for (var i = 0; i < roadLabels.length; i++) {
                var label = roadLabels[i];
                label.style.display = '';
                var box = label.getBoundingClientRect();
                var overlaps = false;

                for (var j = 0; j < shown.length; j++) {
                    if (labelBoxesOverlap(box, shown[j])) {
                        overlaps = true;
                        break;
                    }
                }

                if (overlaps) {
                    label.style.display = 'none';
                } else {
                    shown.push(box);
                }
            }
        }

        function drawRoadLabels() {
            var pane = map.getPane('pane_RoadLabels_Custom');
            if (!pane) return;

            pane.querySelectorAll('.road-label-along-line').forEach(function(el) {
                el.remove();
            });

            layer_Roads_10.eachLayer(function(layer) {
                var labelText = layer.feature && layer.feature.properties
                    ? layer.feature.properties['Road_Label']
                    : null;

                if (!hasPopupValue(labelText)) return;

                var pos = bestLabelPosition(layer);
                if (!pos) return;

                var div = document.createElement('div');
                div.className = 'road-label-along-line';
                div.textContent = String(labelText);

                var angle = correctedRoadLabelAngle(pos.rawAngle, pos.x, pos.y);

                div.setAttribute('data-road-length', pos.len);
                div.setAttribute('data-road-angle', angle);
                div.style.left = pos.x + 'px';
                div.style.top = pos.y + 'px';
                div.style.transform = 'translate(-50%, -50%) rotate(' + angle + 'deg)';

                pane.appendChild(div);
            });

            hideOverlappingRoadLabels();
        }

        function setRoadLabelsVisible(visible) {
            var pane = map.getPane('pane_RoadLabels_Custom');
            if (!pane) return;

            pane.style.display = visible ? 'block' : 'none';
        }

        var roadLabelRedrawTimer = null;

        function scheduleRoadLabelRedraw() {
            if (roadLabelRedrawTimer) {
                clearTimeout(roadLabelRedrawTimer);
            }

            roadLabelRedrawTimer = setTimeout(function() {
                setRoadLabelsVisible(true);
                drawRoadLabels();
            }, 150);
        }

        map.whenReady(function() {
            setRoadLabelsVisible(true);
            drawRoadLabels();
        });

        map.on('zoomstart', function() {
            setRoadLabelsVisible(false);
        });

        map.on('zoomend', function() {
            scheduleRoadLabelRedraw();
        });

        map.on('moveend', function() {
            scheduleRoadLabelRedraw();
        });
        </script>
